packages:
  - 'packages/*'
  - '!**/test/**'

publicHoistPattern:
  - 'eslint'
  - 'tslib'
  - 'eslint-config-*'
  - 'eslint-plugin-*'
  - 'prettier'
  - 'prettier-plugin-*'
  - '@rollup/*'
  - 'rollup'

resolutionMode: highest
dedupeDirectDeps: true
preferWorkspacePackages: true
shellEmulator: true
strictPeerDependencies: true

catalog:
  typescript: "5.9.3"
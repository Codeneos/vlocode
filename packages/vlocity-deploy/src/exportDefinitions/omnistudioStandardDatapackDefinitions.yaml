id: omnistudio-standard
label: OmniStudio Standard
description: Standard runtime
definitions:
  OmniScript: &omniProcessBase
    objectType: OmniProcess
    name:
      - Name
    matchingKeyFields:
      - Type
      - SubType
      - Language
      - VersionNumber
    fields:
      CustomJavaScript:
        fileName:
          - _JavaScript
      PropertySetConfig:
        fileName:
          - _PropertySetConfig
      CustomHtmlTemplates:
        fileName:
          - _HTMLTemplates
    embeddedObjects:
      OmniProcessElement:
        objectType: OmniProcessElement
        filter:
          OmniProcessId: '{OmniProcess:Id}'
        fileName:
          - _Element
          - Name
        expandArray: true

  IntegrationProcedure:
    <<: *omniProcessBase
    matchingKeyFields:
      - Type
      - SubType
      - VersionNumber

  DataRaptor: &omniDataTransform
    objectType: OmniDataTransform
    name:
      - Name
    matchingKeyFields:
      - Name
    fields:
      ExpectedInputJson:
        fileName:
          - _InputJson
      PreviewJsonData:
        fileName:
          - _SampleInputJson
      PreviewXmlData:
        fileName:
          - _SampleInputXML
      ExpectedOutputJson:
        fileName:
          - _TargetOutJson
      ExpectedOutputXml:
        fileName:
          - _TargetOutXml
    embeddedObjects:
      OmniDataTransformItem:
        objectType: OmniDataTransformItem
        filter:
          OmniDataTransformationId: '{OmniDataTransform:Id}'
        fileName:
          - _Items

  OmniProcessElement:
    dependent: true
    objectType: OmniProcessElement
    name:
      - Name
    matchingKeyFields:
      - OmniProcessId
      - Name
    ignoreFields:
      - Level
    fields:
      PropertySetConfig:
        fileName:
          - _PropertySetConfig

  OmniDataTransformItem:
    dependent: true
    objectType: OmniDataTransformItem
    name:
      - GlobalKey
    matchingKeyFields:
      - GlobalKey
    ignoreFields:
      - OmniDataTransformationId

<vlo-editor-header
    icon="server-process"
    iconTitle="Edit procedure properties"
    [title]="model().title"
    [meta]="metaItems()"
    metaLabel="Procedure metadata"
    (iconClick)="selectProcedure.emit()">
    <button type="button" class="ip-button" [disabled]="refreshing()" (click)="refresh.emit()">
        <span class="codicon" [class.codicon-refresh]="!refreshing()" [class.codicon-sync]="refreshing()" [class.codicon-modifier-spin]="refreshing()" aria-hidden="true"></span>
        @if (refreshing()) { Refreshing } @else { Refresh }
    </button>
    <button type="button" class="ip-button" [disabled]="openingSalesforce()" (click)="openSalesforce.emit()">
        <span class="codicon codicon-link-external" aria-hidden="true"></span>
        Open in Org
    </button>
    <button type="button" class="ip-button" (click)="viewSource.emit()">
        <span class="codicon codicon-code" aria-hidden="true"></span>
        Source
    </button>
    <button type="button" class="ip-button" [disabled]="deploying()" (click)="deploy.emit()">
        <span class="codicon codicon-cloud-upload" aria-hidden="true"></span>
        @if (deploying()) { Deploying } @else { Deploy }
    </button>
    <button type="button" class="ip-button ip-button--primary" [disabled]="saving()" (click)="save.emit()">
        <span class="codicon codicon-save" aria-hidden="true"></span>
        @if (saving()) { Saving } @else { Save }
    </button>
</vlo-editor-header>

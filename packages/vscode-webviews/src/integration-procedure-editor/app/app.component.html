@if (!hasLoaded() && error(); as message) {
    <main class="ip-shell ip-shell--center">
        <vlo-empty-state title="Unable to open Integration Procedure" icon="warning" [message]="message" role="alert" actionLabel="Retry" actionIcon="refresh" (action)="requestReload()" />
    </main>
} @else {
    <main class="ip-shell">
        <ip-toolbar
            [model]="model()"
            [problemsCount]="problems().length"
            [refreshing]="refreshing()"
            [openingSalesforce]="openingSalesforce()"
            [deploying]="deploying()"
            [saving]="saving()"
            (selectProcedure)="selectProcedure()"
            (refresh)="refresh()"
            (openSalesforce)="openSalesforce()"
            (viewSource)="viewSource()"
            (deploy)="deploy()"
            (save)="save()" />

        @if (error(); as message) {
            <section class="ip-banner" role="alert">
                <span class="codicon codicon-warning" aria-hidden="true"></span>
                {{ message }}
            </section>
        }

        @if (pendingDeleteElement()) {
            <vlo-dialog
                type="danger"
                title="Confirm delete"
                [message]="pendingDeleteMessage()"
                confirmLabel="Delete"
                (cancel)="cancelDelete()"
                (confirm)="deletePendingElement()" />
        }

        <section
            class="ip-workbench"
            [class.ip-workbench--rail-collapsed]="navigationCollapsed()"
            [class.ip-workbench--inspector-collapsed]="inspectorCollapsed()"
            [style.--ip-inspector-width]="inspectorWidth()">
            <ip-rail
                [collapsed]="navigationCollapsed()"
                [activeTab]="leftTab()"
                [outlineFilter]="outlineFilter()"
                [outlineRows]="filteredOutline()"
                [paletteFilter]="addFilter()"
                [templates]="filteredTemplates()"
                [problems]="problems()"
                [selectedKey]="selectedKey()"
                [draggedKey]="draggedKey()"
                [draggedTemplateType]="draggedTemplateType()"
                [dropTargetKey]="dropTargetKey()"
                [dropPosition]="dropPosition()"
                (toggleCollapsed)="toggleNavigationSidebar()"
                (activeTabChange)="leftTab.set($event)"
                (outlineFilterChange)="outlineFilter.set($event)"
                (paletteFilterChange)="addFilter.set($event)"
                (selectProcedure)="selectProcedure()"
                (selectElement)="selectElement($event)"
                (selectProblem)="selectProblem($event)"
                (templateDragStart)="startTemplateDrag($event.type, $event.event)"
                (elementDragStart)="startDrag($event.key, $event.event)"
                (elementDragOver)="dragOver($event.key, $event.event)"
                (elementDragLeave)="dragLeave($event)"
                (elementDrop)="dropOnElement($event.key, $event.event)"
                (dragEnd)="endDrag()" />

            <ip-canvas
                [flowTree]="flowTree()"
                [selectedKey]="selectedKey()"
                [draggedKey]="draggedKey()"
                [dropTargetKey]="dropTargetKey()"
                [dropPosition]="dropPosition()"
                [insertContext]="pendingInsert()"
                [insertFilter]="insertFilter()"
                [insertTemplates]="filteredInsertTemplates()"
                [emptyFlowDropKey]="emptyFlowDropKey"
                (selectProcedure)="selectProcedure()"
                (openPalette)="leftTab.set('add')"
                (selectElement)="selectElement($event)"
                (deleteRequested)="confirmDeleteElement($event)"
                (addChildElement)="addChildElement($event)"
                (openInsertPicker)="openInsertPicker($event.afterKey, $event.parentKey)"
                (closeInsertPicker)="closeInsertPicker()"
                (insertFilterChange)="insertFilter.set($event)"
                (addSelectedElement)="addSelectedElement($event)"
                (elementDragStart)="startDrag($event.key, $event.event)"
                (elementDragOver)="dragOver($event.key, $event.event)"
                (elementDragLeave)="dragLeave($event)"
                (elementDrop)="dropOnElement($event.key, $event.event)"
                (insertDragOver)="dragOverInsert($event.key, $event.event)"
                (insertDrop)="dropOnInsert($event.key, $event.event)"
                (groupDragOver)="dragOverGroup($event.key, $event.event)"
                (groupDrop)="dropOnGroup($event.key, $event.event)"
                (emptyFlowDragOver)="dragOverEmptyFlow($event)"
                (emptyFlowDragLeave)="dragLeaveEmptyFlow()"
                (emptyFlowDrop)="dropOnEmptyFlow($event)"
                (dragEnd)="endDrag()" />

            <ip-inspector
                [collapsed]="inspectorCollapsed()"
                [activeTab]="inspectorTab()"
                [inspectorTabs]="inspectorTabs"
                [model]="model()"
                [selectedElement]="selectedElement()"
                [propertySet]="activePropertySet()"
                [apexClassOptions]="apexClassOptions()"
                [dataMapperOptions]="dataMapperOptions()"
                [dataRaptorInputParameters]="dataRaptorInputParameters()"
                [jsonDraft]="jsonDraft()"
                [jsonError]="jsonError()"
                [jsonTargetLabel]="jsonTargetLabel()"
                [jsonEditorOptions]="jsonEditorOptions"
                (toggleCollapsed)="toggleInspector()"
                (resizeStart)="startInspectorResize($event)"
                (resizeKeydown)="resizeInspectorWithKeyboard($event)"
                (activeTabChange)="inspectorTab.set($event)"
                (duplicateElement)="duplicateElement($event)"
                (deleteRequested)="confirmDeleteElement($event)"
                (headerFieldChange)="updateHeaderField($event)"
                (elementFieldChange)="updateElementFieldValue($event)"
                (propertyChange)="updateElementPropertyFromChange($event)"
                (procedurePropertyChange)="updateProcedurePropertyFromChange($event)"
                (referenceOpen)="openReference($event)"
                (mapEntriesChange)="updateMapEntries($event)"
                (dataRaptorParameterAdd)="addDataRaptorInputParameter()"
                (dataRaptorParameterChange)="updateDataRaptorInputParameter($event)"
                (dataRaptorParameterDelete)="deleteDataRaptorInputParameter($event)"
                (jsonDraftChange)="setJsonDraftValue($event)"
                (applyJson)="applyJson()" />
        </section>
    </main>
}

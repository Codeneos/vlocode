exportDefinitions:
  OmniScript:
    - &managedOmniScriptBase
      objectType: "%vlocity_namespace%__OmniScript__c"
      name:
        - Name
      matchingKeyFields:
        - "%vlocity_namespace%__Type__c"
        - "%vlocity_namespace%__SubType__c"
        - "%vlocity_namespace%__Language__c"
        - "%vlocity_namespace%__Version__c"
      ignoreFields:
        - "%vlocity_namespace%__IsActive__c"
      fields:
        "%vlocity_namespace%__CustomJavaScript__c":
          fileName:
            - _JavaScript
        "%vlocity_namespace%__PropertySet__c":
          fileName:
            - _PropertySet
        "%vlocity_namespace%__TestHTMLTemplates__c":
          fileName:
            - _HTMLTemplates
      embeddedObjects:
        "%vlocity_namespace%__Element__c":
          objectType: "%vlocity_namespace%__Element__c"
          filter:
            "%vlocity_namespace%__OmniScriptId__c": "{%vlocity_namespace%__OmniScript__c:Id}"
          limit: 5000
          fileName:
            - _Element
            - Name
          expandArray: true

    - &omniProcessBase
      objectType: OmniProcess
      name:
        - Name
      matchingKeyFields:
        - Type
        - SubType
        - Language
        - VersionNumber
      fields:
        CustomJavaScript:
          fileName:
            - _JavaScript
        PropertySetConfig:
          fileName:
            - _PropertySetConfig
        CustomHtmlTemplates:
          fileName:
            - _HTMLTemplates
      embeddedObjects:
        OmniProcessElement:
          objectType: OmniProcessElement
          filter:
            OmniProcessId: "{OmniProcess:Id}"
          fileName:
            - _Element
            - Name
          expandArray: true

  IntegrationProcedure:
    - <<: *managedOmniScriptBase
      matchingKeyFields:
        - "%vlocity_namespace%__Type__c"
        - "%vlocity_namespace%__SubType__c"
        - "%vlocity_namespace%__Version__c"

    - <<: *omniProcessBase
      matchingKeyFields:
        - Type
        - SubType
        - VersionNumber

  "%vlocity_namespace%__OmniScript__c":
    <<: *managedOmniScriptBase

  OmniProcess:
    <<: *omniProcessBase

  DataRaptor:
    - &managedDataRaptor
      objectType: "%vlocity_namespace%__DRBundle__c"
      name:
        - Name
      matchingKeyFields:
        - Name
      ignoreFields:
        - "%vlocity_namespace%__FormulaConverted__c"
      fields:
        "%vlocity_namespace%__InputJson__c":
          fileName:
            - _InputJson
        "%vlocity_namespace%__SampleInputJSON__c":
          fileName:
            - _SampleInputJson
        "%vlocity_namespace%__SampleInputXML__c":
          fileName:
            - _SampleInputXML
        "%vlocity_namespace%__TargetOutJson__c":
          fileName:
            - _TargetOutJson
        "%vlocity_namespace%__TargetOutXml__c":
          fileName:
            - _TargetOutXml
      embeddedObjects:
        "%vlocity_namespace%__DRMapItem__c":
          objectType: "%vlocity_namespace%__DRMapItem__c"
          filter:
            Name: "{%vlocity_namespace%__DRBundle__c:Name}"
          fileName:
            - _Mappings

    - &omniDataTransform
      objectType: OmniDataTransform
      name:
        - Name
      matchingKeyFields:
        - VersionNumber
        - Name
      fields:
        ExpectedInputJson:
          fileName:
            - _InputJson
        PreviewJsonData:
          fileName:
            - _SampleInputJson
        PreviewXmlData:
          fileName:
            - _SampleInputXML
        ExpectedOutputJson:
          fileName:
            - _TargetOutJson
        ExpectedOutputXml:
          fileName:
            - _TargetOutXml
      embeddedObjects:
        OmniDataTransformItem:
          objectType: OmniDataTransformItem
          filter:
            OmniDataTransformationId: "{OmniDataTransform:Id}"
          fileName:
            - _Items

  "%vlocity_namespace%__DRBundle__c":
    <<: *managedDataRaptor

  OmniDataTransform:
    <<: *omniDataTransform

  "%vlocity_namespace%__Element__c":
    objectType: "%vlocity_namespace%__Element__c"
    name:
      - Name
    matchingKeyFields:
      - "%vlocity_namespace%__OmniScriptId__c"
      - Name
    ignoreFields:
      - "%vlocity_namespace%__OmniScriptVersion__c"
      - "%vlocity_namespace%__Level__c"
    fields:
      "%vlocity_namespace%__PropertySet__c":
        fileName:
          - _PropertySet

  OmniProcessElement:
    objectType: OmniProcessElement
    name:
      - Name
    matchingKeyFields:
      - OmniProcessId
      - Name
    ignoreFields:
      - Level
    fields:
      PropertySetConfig:
        fileName:
          - _PropertySetConfig

  "%vlocity_namespace%__DRMapItem__c":
    objectType: "%vlocity_namespace%__DRMapItem__c"
    name:
      - "%vlocity_namespace%__MapId__c"
    matchingKeyFields:
      - "%vlocity_namespace%__MapId__c"
      - Name

  OmniDataTransformItem:
    objectType: OmniDataTransformItem
    name:
      - GlobalKey
    matchingKeyFields:
      - GlobalKey
    ignoreFields:
      - OmniDataTransformationId

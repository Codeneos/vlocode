name: CI

on:
  pull_request: {}
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup workspace
        uses: ./.github/actions/setup-workspace

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm jest --ci --verbose -i

      - name: Lint
        run: pnpm lint -o eslint-report.json --format json || true

      - name: Check Sonar token availability
        id: sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: '[[ -n "$SONAR_TOKEN" ]] && echo "enabled=true" >> "$GITHUB_OUTPUT" || echo "enabled=false" >> "$GITHUB_OUTPUT"'

      - name: SonarCloud Scan
        if: ${{ steps.sonar.outputs.enabled == 'true' }}
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Upload test result (junit)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: coverage/junit.xml
          if-no-files-found: warn
          retention-days: 14

      - name: Upload coverage artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-artifacts
          path: |
            coverage/sonar-report.xml
            coverage/lcov.info
            eslint-report.json
          if-no-files-found: warn
          retention-days: 14

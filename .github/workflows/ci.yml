name: CI

on:
  pull_request: {}
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip-main-ci]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup workspace
        uses: ./.github/actions/setup-workspace

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm jest --ci --verbose -i

      - name: Lint
        run: pnpm lint -o eslint-report.json --format json || true

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Upload test result (junit)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: coverage/junit.xml
          if-no-files-found: warn
          retention-days: 14

      - name: Upload coverage artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-artifacts
          path: |
            coverage/sonar-report.xml
            coverage/lcov.info
            eslint-report.json
          if-no-files-found: warn
          retention-days: 14

  static-analysis:
    name: Static Analysis (CodeQL)
    runs-on: ubuntu-latest
    # Free SAST, complementing the SonarQube scan above. Runs for same-repo
    # PRs and on pushes to main (to keep the code-scanning baseline fresh).
    # Skipped on fork PRs because the SARIF upload needs `security-events:
    # write`, which GITHUB_TOKEN does not grant there, and on [skip-main-ci]
    # release commits.
    if: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) || (github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip-main-ci]')) }}

    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:javascript-typescript'

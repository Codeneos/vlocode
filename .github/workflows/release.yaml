name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      bump_type:
        description: Version bump type
        required: true
        type: choice
        options: [patch, minor, major]
      prerelease:
        description: Create a prerelease version (rc)
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version-and-tag:
    if: ${{ github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    outputs:
      release_ref: ${{ steps.release-ref.outputs.ref }}

    steps:
      - name: Checkout
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup workspace
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: ./.github/actions/setup-workspace

      - name: Configure git author
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Version and tag with lerna
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          BUMP_TYPE: ${{ inputs.bump_type }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          VERSION_ARG="$BUMP_TYPE"
          if [[ "$PRERELEASE" == "true" ]]; then
            case "$BUMP_TYPE" in
              patch|minor|major) VERSION_ARG="pre$BUMP_TYPE" ;;
              *) exit 1 ;;
            esac
            pnpm lerna version "$VERSION_ARG" --preid rc --message "[skip-main-ci] chore(release): publish %s" --yes
          else
            pnpm lerna version "$VERSION_ARG" --message "[skip-main-ci] chore(release): publish %s" --yes
          fi

      - name: Push commit and tags
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: git push origin HEAD --follow-tags

      - name: Resolve release ref
        id: release-ref
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "ref=refs/tags/v$(node -p "require('./lerna.json').version")" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF}" >> "$GITHUB_OUTPUT"
          fi

  package:
    needs: version-and-tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-and-tag.outputs.release_ref }}

      - name: Setup workspace
        uses: ./.github/actions/setup-workspace

      - name: Resolve release metadata
        id: meta
        run: |
          VERSION=$(node -p "require('./lerna.json').version")
          PRERELEASE=false
          [[ "$VERSION" =~ "-" ]] && PRERELEASE=true
          [[ "$PRERELEASE" == "true" ]] && echo "Detected pre-release version $VERSION" || echo "Detected release version $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Pack extension
        run: |
          ARGS=""
          [[ "${{ steps.meta.outputs.prerelease }}" == "true" ]] && ARGS="--pre-release"
          echo "Packing extension version ${{ steps.meta.outputs.version }} ${ARGS:+(pre-release)}"
          pnpm pack-extension ${ARGS}

      - name: Generate release notes
        run: node -e "const fs = require('node:fs'); fs.writeFileSync('./release-notes.md', fs.readFileSync('./CHANGELOG.md').toString().match(/(##? \[(.*?))## \[/s)[1])"

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Version ${{ steps.meta.outputs.version }}
          body_path: release-notes.md
          files: packages/vscode-extension/*.vsix
          prerelease: ${{ steps.meta.outputs.prerelease }}
          append_body: false
          make_latest: true
          fail_on_unmatched_files: true

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            release-notes.md
            packages/vscode-extension/*.vsix

  publish-approval:
    runs-on: ubuntu-latest
    needs: package
    # Configure required reviewers on this environment to mirror CircleCI manual approval.
    environment:
      name: release-publish

    steps:
      - name: Await approval
        run: echo "Release artifacts are ready for publishing."

  publish-extensions:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [vscode, ovsx]
    needs:
      - publish-approval
      - package

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup workspace
        uses: ./.github/actions/setup-workspace

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: artifacts

      - name: Publish extension
        env:
          VERSION: ${{ needs.package.outputs.version }}
          TOKEN: ${{ matrix.target == 'vscode' && secrets.VSCE_TOKEN || secrets.OVSX_TOKEN }}
          CMD: ${{ matrix.target == 'vscode' && 'vsce' || 'ovsx' }}
          PRERELEASE: ${{ needs.package.outputs.prerelease == 'true' && '--pre-release' || '' }}
        run: |
          pnpx "$CMD" publish -p "$TOKEN" $PRERELEASE --packagePath "./artifacts/packages/vscode-extension/vlocode-${VERSION}.vsix"

  publish-npm-packages:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      id-token: write

    needs:
      - publish-approval
      - package

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup workspace
        uses: ./.github/actions/setup-workspace

      - name: Build npm packages
        run: pnpm run --filter @vlocode/* build

      - name: Publish npm packages
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          VERSION=$(node -p "require('./lerna.json').version")
          if [[ "$VERSION" =~ '-' ]]; then
            echo "Detected prerelease version ${VERSION}; publishing with dist-tag 'beta'"
            pnpm lerna publish from-package --dist-tag beta --force-publish --no-push --yes
          else
            echo "Detected stable version ${VERSION}; publishing with default 'latest' tag"
            pnpm lerna publish from-package --force-publish --no-push --yes
          fi

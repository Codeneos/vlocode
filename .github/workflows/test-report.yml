name: Test Report

on:
  workflow_run:
    workflows: ['CI']
    types:
      - completed

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  report:
    if: ${{ github.event.workflow_run.conclusion != 'cancelled' }}
    runs-on: ubuntu-latest

    steps:
      - name: Publish test results
        uses: phoenix-actions/test-reporting@v15
        with:
          artifact: test-results
          name: Unit Tests
          path: '**/*.xml'
          reporter: jest-junit
          fail-on-error: 'false'
